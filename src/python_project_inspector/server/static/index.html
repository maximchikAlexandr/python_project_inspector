<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Python Project Inspector</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; line-height: 1.4; }
    section { margin-bottom: 2rem; }
    pre { background: #f5f5f5; padding: 1rem; overflow: auto; max-height: 20rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 0.4rem 0.6rem; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Python Project Inspector</h1>
  <p>Dashboard reads stored history via HTTP API (FR-016–FR-021).</p>
  <section>
    <h2>Status</h2>
    <pre id="status">Loading...</pre>
  </section>
  <section>
    <h2>Commits</h2>
    <pre id="commits">Loading...</pre>
  </section>
  <section>
    <h2>Module hotspots (cyclomatic mean)</h2>
    <div id="hotspots">Loading...</div>
  </section>
  <section>
    <h2>Coupling edges (latest commit)</h2>
    <div id="edges">Loading...</div>
  </section>
  <script>
    async function fetchJson(path) {
      const response = await fetch(path);
      if (!response.ok) {
        throw new Error(`${path} -> ${response.status}`);
      }
      return response.json();
    }

    function renderHotspots(items) {
      if (!items.length) {
        return "<p>No hotspot data yet.</p>";
      }
      const rows = items.map(
        (item) => `<tr><td>${item.name}</td><td>${item.current}</td><td>${item.growth ?? ""}</td></tr>`,
      );
      return `<table><thead><tr><th>Module</th><th>Current</th><th>Growth</th></tr></thead><tbody>${rows.join("")}</tbody></table>`;
    }

    function renderEdges(payload) {
      const edges = payload.edges || [];
      if (!edges.length) {
        return `<p>No edges for commit ${payload.commit_hash ?? "n/a"}.</p>`;
      }
      const rows = edges.map(
        (edge) => `<tr><td>${edge.source}</td><td>${edge.target}</td><td>${edge.score}</td></tr>`,
      );
      return `<p>Commit: ${payload.commit_hash}</p><table><thead><tr><th>Source</th><th>Target</th><th>Score</th></tr></thead><tbody>${rows.join("")}</tbody></table>`;
    }

    async function load() {
      const status = await fetchJson("/api/status");
      document.getElementById("status").textContent = JSON.stringify(status, null, 2);
      const commits = await fetchJson("/api/commits");
      document.getElementById("commits").textContent = JSON.stringify(commits, null, 2);
      const hotspots = await fetchJson("/api/hotspots?level=module&metric=cyclomatic&by=value&limit=10");
      document.getElementById("hotspots").innerHTML = renderHotspots(hotspots.items || []);
      const edges = await fetchJson("/api/edges?min_score=1");
      document.getElementById("edges").innerHTML = renderEdges(edges);
    }

    load().catch((error) => {
      document.body.insertAdjacentHTML("beforeend", `<pre>${error}</pre>`);
    });
  </script>
</body>
</html>
